<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vintage Sci-Fi Calculator</title>

<style>
    body {
        background: red(circle at center, #111 0%, #000 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Courier New", monospace;
    }

    .calculator {
        background: linear-gradient(145deg, #1a1a1a, #2b2b2b);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 
            0 0 30px rgba(0,255,0,0.2),
            inset 0 0 20px rgba(0,255,0,0.1);
        width: 320px;
        border: 2px solid #0f0;
    }

    .display {
        background: #001100;
        color: #00ff66;
        font-size: 2rem;
        text-align: right;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 
            inset 0 0 15px rgba(0,255,0,0.5),
            0 0 20px rgba(0,255,0,0.3);
        text-shadow: 0 0 8px #00ff66;
        overflow-x: auto;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
    }

    button {
        padding: 18px;
        font-size: 1.1rem;
        background: #111;
        color: #00ffcc;
        border: 1px solid #00ffcc;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 0 8px rgba(0,255,204,0.3);
    }

    button:hover {
        background: #002222;
        box-shadow: 0 0 15px rgba(0,255,204,0.8);
        transform: translateY(-2px);
    }

    .operator {
        color: #ff00ff;
        border-color: #ff00ff;
        box-shadow: 0 0 8px rgba(255,0,255,0.4);
    }

    .operator:hover {
        background: #220022;
        box-shadow: 0 0 15px rgba(255,0,255,0.9);
    }

    .equal {
        grid-column: span 2;
        background: #003300;
        color: #00ff00;
        border-color: #00ff00;
    }

    .equal:hover {
        background: #005500;
        box-shadow: 0 0 20px rgba(0,255,0,1);
    }

    .clear {
        color: #ff4444;
        border-color: #ff4444;
    }

    .clear:hover {
        background: #220000;
        box-shadow: 0 0 15px rgba(255,0,0,0.8);
    }

    .title {
        text-align: center;
        color: #00ff66;
        margin-bottom: 15px;
        font-size: 1rem;
        letter-spacing: 2px;
        text-shadow: 0 0 10px #00ff66;
    }
</style>
</head>
<body>

<div class="calculator">
    <div class="title">RETRO-X 9000</div>
    <div id="display" class="display">0</div>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function appendValue(value) {
        if (display.innerText === "0") {
            display.innerText = value;
        } else {
            display.innerText += value;
        }
    }

    function clearDisplay() {
        display.innerText = "0";
    }

    function deleteLast() {
        display.innerText = display.innerText.slice(0, -1);
        if (display.innerText === "") {
            display.innerText = "0";
        }
    }

    function calculate() {
        try {
            display.innerText = Function('"use strict";return (' + display.innerText + ')')();
        } catch {
            display.innerText = "ERROR";
        }
    }
</script>

</body>
</html>
